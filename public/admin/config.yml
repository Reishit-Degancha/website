backend:
  name: git-gateway
  branch: main

# Uncomment for local testing (saves to filesystem instead of git)
local_backend: true

# Site URL
site_url: https://rdegancha.netlify.app
display_url: https://rdegancha.netlify.app

media_folder: "public/uploads"
public_folder: "/uploads"

# Disable new page creation (pages are defined in code)
collections:
  - name: "pages"
    label: "דפי תוכן"
    folder: "src/content/pages"
    create: false
    delete: false
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - label: "כותרת"
        name: "title"
        widget: "string"
        required: true

      - label: "תיאור (ל-SEO)"
        name: "description"
        widget: "string"
        required: false

      - label: "תוכן"
        name: "body"
        widget: "markdown"
        required: true
